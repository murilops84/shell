server:
    interface: 127.0.0.1
    access-control: 127.0.0.1/32 allow
    
    # Cache de 5 minutos
    cache-min-ttl: 0
    cache-max-ttl: 300
    msg-cache-size: 50m
    rrset-cache-size: 100m
    key-cache-size: 4m
    
    # Protocolo
    do-not-query-localhost: no
    do-tcp: yes
    do-udp: yes
    
    # Performance
    num-threads: 4
    outgoing-range: 8192
    num-queries-per-thread: 4096
    
    # Timeouts mais agressivos
    infra-host-ttl: 60
    
    # DNSSEC permissivo
    val-permissive-mode: yes
    
    # Insecure domains
    domain-insecure: "domaincompany.com"
    domain-insecure: "company.com"
    domain-insecure: "database.windows.net"
    domain-insecure: "domain-foo.com"
    
    # Prefetch para renovar cache antes de expirar
    prefetch: yes
    prefetch-key: yes
    
    # Logging
    #verbosity: 1
    #use-syslog: yes

forward-zone:
    name: "domaincompany.com"
    forward-addr: 10.1.1.5 # Company DNS IP Address
    forward-addr: 10.1.1.6 # Company DNS IP Address
    forward-first: no

forward-zone:
    name: "company.com"
    forward-addr: 10.1.1.5
    forward-addr: 10.1.1.6
    forward-first: no

forward-zone:
    name: "domain-foo.com"
    forward-addr: 10.1.1.5
    forward-addr: 10.1.1.6
    forward-first: no

forward-zone:
    name: "database.windows.net"
    forward-addr: 10.1.1.5
    forward-addr: 10.1.1.6
    forward-first: no

forward-zone:
    name: "."
    forward-addr: 1.1.1.1 
    forward-addr: 1.0.0.1
    forward-first: no
